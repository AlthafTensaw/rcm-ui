name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs on new commits to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Build apps
        run: pnpm build:apps
        env:
          # Stub values so production build env validation passes in CI.
          # Real values are injected during deploy.
          VITE_API_BASE_URL: https://api.ci.example.com
          VITE_COGNITO_REGION: us-east-1
          VITE_COGNITO_USER_POOL_ID: us-east-1_ciStub
          VITE_COGNITO_CLIENT_ID: ciStubClientId
          VITE_APP_ID: patient
          VITE_BUILD_VERSION: ${{ github.sha }}
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_ciStub
